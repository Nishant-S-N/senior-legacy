<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senior's Legacy - Login/Signup</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="login-page">
    <div class="form-box">
        <h2 id="formTitle">Join Senior's Legacy</h2>
        <p>Use your official university email to continue.</p>

        <div class="input-group" id="usernameGroup" style="display: block;">
            <label for="usernameInput">Nickname</label>
            <input type="text" id="usernameInput" placeholder="username" required>
            <span id="usernameFeedback" class="input-hint">Must have numeric, small letter, capital letter, and one special character (@, #, $, &, -, _). 3-15 chars, no spaces.</span>
        </div>

        <div class="input-group">
            <label for="emailInput">University Email</label>
            <input type="email" id="emailInput" placeholder="" required>
        </div>
        
        <div class="input-group">
            <label for="passwordInput">Password</label>
            <div class="password-container">
                <input type="password" id="passwordInput" placeholder="Enter Password" required>
                <span id="togglePassword" class="eye-icon">👁️</span>
            </div>
        </div>
        
        <button id="actionBtn">Sign Up</button>
        <p id="message"></p>

        <div class="toggle-container">
            <span id="questionText">Already signed up?</span> 
            <a id="toggleLink">Login here</a>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
