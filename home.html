<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senior's Legacy - Home</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="header-left">
            <h1>Senior's Legacy</h1>
        </div>
    </header>

    <nav class="category-bar" id="categoryBar">
        <button class="category-btn active">All</button>
        <button class="category-btn">Department</button>
        <button class="category-btn">Library</button>
        <button class="category-btn">Secret Places</button>
        <button class="category-btn">Campus</button>
    </nav>
    
    <main>
        <div class="search-container" id="searchContainer" style="display: none; background: white; padding: 12px 20px; border-radius: 20px; margin-bottom: 25px; box-shadow: 0px 8px 24px rgba(149, 157, 165, 0.1); align-items: center; position: relative;">
            <span style="color: #6c5ce7; font-weight: 700; font-size: 18px; position: absolute; left: 32px;">@</span>
            <input type="text" id="searchUserInput" placeholder="Search a senior's username..." style="width: 100%; padding: 12px 12px 12px 30px; border: 1px solid #dfe6e9; border-radius: 20px; font-size: 15px; outline: none; box-sizing: border-box; background: #f8fafc;">
            <button id="clearSearchBtn" style="display: none; position: absolute; right: 30px; background: #ff4757; color: white; border: none; border-radius: 50%; width: 24px; height: 24px; cursor: pointer; font-weight: bold; line-height: 1; transition: 0.2s;">✕</button>
        </div>

        <div class="feed-container" id="feedContainer">
            <h3 style="color: #a4b0be;">Loading advice from seniors...</h3>
        </div>
    </main>

    <div id="postModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <button id="closeModalBtn" class="cancel-btn">Cancel</button>
                <h3 style="margin: 0; font-weight: 800; color: #2d3436;">Create Post</h3>
                <button id="submitPostBtn" class="post-btn">Post</button>
            </div>
            
            <textarea id="postTextarea" placeholder="Share your advice... Use #Library, #Campus, #Department, or #SecretPlaces to auto-categorize!"></textarea>
            
            <div class="modal-footer">
                <input type="file" id="fileInput" accept="image/*,video/*,application/pdf" hidden>
                <button id="uploadFileBtn" class="upload-icon-btn" title="Attach Photo/Video/PDF">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                        <circle cx="8.5" cy="8.5" r="1.5"></circle>
                        <polyline points="21 15 16 10 5 21"></polyline>
                    </svg>
                </button>
                <span id="fileNameDisplay" class="file-name-text"></span>
            </div>
        </div>
    </div>

    <div id="viewPostModal" class="modal-overlay" style="z-index: 2010;">
        <div class="modal-content" style="max-height: 90vh; overflow-y: auto; display: flex; flex-direction: column;">
            <div class="modal-header">
                <h3 style="margin: 0; font-weight: 800; color: #2d3436;">Post Thread</h3>
                <button id="closeViewModalBtn" class="cancel-btn">Close</button>
            </div>
            
            <div id="fullPostContent" style="margin-bottom: 15px;"></div>

            <h4 style="margin: 0 0 10px 0; color: #2d3436; font-weight: 700; border-top: 2px solid #f0f2f5; padding-top: 15px;">Replies</h4>
            <div id="commentsContainer" style="flex-grow: 1; overflow-y: visible; margin-bottom: 10px;"></div>

            <div class="comment-input-area">
                <textarea id="commentTextarea" placeholder="Write a reply to help this senior..." style="width: 100%; min-height: 60px; border: 2px solid #dfe6e9; border-radius: 12px; padding: 12px; font-size: 14px; outline: none; resize: none; background: #f8fafc; font-family: inherit; box-sizing: border-box;"></textarea>
                
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <div style="display: flex; align-items: center;">
                        <input type="file" id="commentFileInput" accept="image/*,video/*,application/pdf" hidden>
                        <button id="commentUploadBtn" class="upload-icon-btn" style="width: 38px; height: 38px;" title="Attach File/Photo">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                <circle cx="8.5" cy="8.5" r="1.5"></circle>
                                <polyline points="21 15 16 10 5 21"></polyline>
                            </svg>
                        </button>
                        <span id="commentFileNameDisplay" class="file-name-text" style="font-size: 12px;"></span>
                    </div>
                    <button id="submitCommentBtn" class="post-btn" style="padding: 10px 20px; font-size: 14px;">Reply</button>
                </div>
            </div>
        </div>
    </div>

    <div id="profileModal" class="modal-overlay">
        <div class="modal-content" style="max-height: 90vh; overflow-y: auto; text-align: center;">
            <div class="modal-header">
                <h3 style="margin: 0; font-weight: 800; color: #2d3436;">My Profile</h3>
                <button id="closeProfileBtn" class="cancel-btn">Close</button>
            </div>
            <div style="padding: 20px 0;">
                <div style="font-size: 55px; margin-bottom: 10px;">👤</div>
                <h2 id="profileNicknameDisplay" style="margin: 0; color: #6c5ce7; font-weight: 700;">Loading...</h2>
                <p id="profileEmailDisplay" style="color: #a4b0be; font-size: 14px; margin-top: 5px; font-weight: 600; margin-bottom: 5px;"></p>
                
                <p id="profileBioDisplay" style="color: #636e72; font-size: 14px; margin: 15px 10px; font-style: italic; line-height: 1.4; white-space: pre-wrap;"></p>
                
                <div id="editProfileForm" class="edit-profile-form">
                    <input type="text" id="editNicknameInput" placeholder="New Username">
                    <span id="editFeedback" style="font-size: 12px; color: #a4b0be; max-width: 80%; line-height: 1.4; margin-bottom: 15px;">Must have numeric, small, capital, and special char (@#$&-_). 3-15 chars, no spaces.</span>
                    
                    <textarea id="editBioInput" placeholder="Write a short bio or share your social media links..." style="width: 85%; padding: 12px; border: 2px solid #dfe6e9; border-radius: 12px; margin-bottom: 10px; font-size: 14px; font-family: inherit; resize: none; min-height: 80px; background: #f8fafc; outline: none;"></textarea>

                    <div class="edit-controls">
                        <button id="saveProfileBtn" class="save-btn">Save</button>
                        <button id="cancelEditBtn" class="cancel-edit-btn">Cancel</button>
                    </div>
                </div>
                <div class="profile-actions" id="profileActionButtons">
                    <button id="editProfileBtn" class="edit-profile-btn">Edit Profile</button>
                    <button id="actualLogoutBtn">Log Out</button>
                </div>
            </div>
            <hr style="border: 0; border-top: 2px solid #f0f2f5; margin: 20px 0;">
            <h3 style="text-align: left; margin-bottom: 15px; color: #2d3436; font-weight: 800;">My Posts</h3>
            <div id="myPostsContainer" style="text-align: left;"></div>
        </div>
    </div>

    <nav class="bottom-bar">
        <div class="nav-item" id="homeBtn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
            <span>Home</span>
        </div>
        
        <div class="nav-item" id="searchToggleBtn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <span>Search</span>
        </div>

        <button id="writeAdviceBtn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
            <span>Post</span>
        </button>

        <div class="nav-item" id="profileBtn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
            </svg>
            <span>Profile</span>
        </div>
    </nav>

    <script type="module" src="script.js"></script>
</body>
</html>
